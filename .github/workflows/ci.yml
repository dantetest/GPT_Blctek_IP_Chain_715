name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: |
            apps/api/go.mod
            apps/data-agent/go.mod
            apps/worker/go.mod
            packages/manifest-spec/go.mod
            packages/manifest-spec/go.sum
      - name: Format check
        run: test -z "$(gofmt -l $(find apps packages -name '*.go' -type f))"
      - name: Unit tests
        run: go test ./apps/api/... ./apps/worker/... ./apps/data-agent/... ./packages/manifest-spec/...
      - name: Vet
        run: go vet ./apps/api/... ./apps/worker/... ./apps/data-agent/... ./packages/manifest-spec/...

  dataset-mysql-integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: blctekip
          MYSQL_USER: blctekip
          MYSQL_PASSWORD: blctekip
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: apps/api/go.mod
      - name: Apply migrations
        env:
          MYSQL_PWD: blctekip
        run: |
          for migration in database/migrations/*.up.sql; do
            mysql --protocol=tcp -h 127.0.0.1 -u blctekip blctekip < "$migration"
          done
      - name: Run MySQL repository integration test
        env:
          MYSQL_TEST_DSN: blctekip:blctekip@tcp(127.0.0.1:3306)/blctekip?parseTime=true&charset=utf8mb4&collation=utf8mb4_unicode_ci
        run: go test ./apps/api/internal/dataset/infrastructure/mysql -run TestRepositoryIntegration -count=1

  manifest-cross-platform:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: |
            packages/manifest-spec/go.mod
            packages/manifest-spec/go.sum
      - name: Run Manifest v1 vectors
        run: go test ./packages/manifest-spec/...

  repository-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          python -m json.tool apps/web/package.json >/dev/null
          python -m json.tool apps/web/tsconfig.json >/dev/null
          python -m json.tool packages/manifest-spec/testdata/vectors.json >/dev/null
      - name: Check migration pairs
        run: |
          set -eu
          for up in database/migrations/*.up.sql; do
            down="${up%.up.sql}.down.sql"
            test -f "$down" || { echo "missing migration pair: $down"; exit 1; }
          done
          for down in database/migrations/*.down.sql; do
            up="${down%.down.sql}.up.sql"
            test -f "$up" || { echo "missing migration pair: $up"; exit 1; }
          done
      - name: Reject committed environment secrets
        run: |
          if find . -path './.git' -prune -o -name '.env' -print | grep -q .; then
            echo '.env files must not be committed'
            exit 1
          fi
